---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-mock-server-1s
  namespace: performance-test
  labels:
    app: perf-mock-server-1s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: perf-mock-server-1s
  template:
    metadata:
      labels:
        app: perf-mock-server-1s
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: gx3-24x120x1l40s
      containers:
      - name: server
        image: quay.io/rh-ee-aharush/perf-mock-server-1s:latest
        imagePullPolicy: Always
        args: ["--addr", ":8080"]
        env:
        - name: GOGC
          value: "off"
        - name: GOMEMLIMIT
          value: "2GiB"
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: perf-mock-server-1s
  namespace: performance-test
  labels:
    app: perf-mock-server-1s
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: perf-mock-server-1s
  type: ClusterIP
