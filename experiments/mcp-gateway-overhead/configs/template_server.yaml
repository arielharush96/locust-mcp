---
# Spike test: __USERS__ users, CPS=__CPS__, direct to perf-mock-server
apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: performance-test
  labels:
    test: mock-perf
    calls-per-session: "__CPS__"
    target: server
    users: "__USERS__"
spec:
  template:
    metadata:
      labels:
        app: __JOB_NAME__
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      containers:
      - name: locust
        image: locustio/locust:2.32.7
        env:
        - name: TOOL_PREFIX
          value: ""
        - name: HOST_HEADER
          value: ""
        - name: CALLS_PER_SESSION
          value: "__CPS__"
        command: ["/bin/sh", "-c"]
        args:
        - |
          locust -f /scripts/locustfile.py \
            --host http://perf-mock-server.performance-test.svc.cluster.local:8080 \
            --headless \
            -u __USERS__ \
            -r __USERS__ \
            -t __DURATION__s \
            --stop-timeout 5 \
            --csv /tmp/results \
            --csv-full-history \
            2>&1
          echo "===CSV_STATS==="
          cat /tmp/results_stats.csv 2>/dev/null
          echo "===CSV_STATS_HISTORY==="
          cat /tmp/results_stats_history.csv 2>/dev/null
          echo "===CSV_FAILURES==="
          cat /tmp/results_failures.csv 2>/dev/null
          echo "===CSV_END==="
          sleep 15
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: locust-scripts-mock
      restartPolicy: Never
  backoffLimit: 0
